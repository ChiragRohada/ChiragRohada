<html>
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <br /><br />
    <nav class="navbar navbar-light bg-light">
      <div class="container-fluid">
        <div class="d-flex">
          <input
            class="form-control me-2"
            id="myText"
            type="text"
            value="Pune"
            aria-label="Search"
          />
          <button class="btn btn-outline-success" onclick="my()">Search</button>
        </div>
      </div>
    </nav>

    <br /><br />
    <div class="card-group">
      <div class="card">
        <img src="" id="ic0" width="40%" />
        <div class="card-body">
          <h4 class="card-title" id="t0">TODAYS TEMP</h4>
          <h4 id="today0"></h4>
        </div>

        <div class="card-footer">
          <small class="text-muted">Last updated 3 mins ago</small>
        </div>
      </div>

      <div class="card">
        <img src="" id="ic1" width="40%" />
        <div class="card-body">
          <h4 class="card-title" id="t1">EMP</h4>
          <h4 id="today1"></h4>
        </div>

        <div class="card-footer">
          <small class="text-muted">Last updated 3 mins ago</small>
        </div>
      </div>

      <div class="card">
        <img src="" id="ic2" width="40%" />
        <div class="card-body">
          <h4 class="card-title" id="t2">TODAYS TEMP</h4>
          <h4 id="today2"></h4>
        </div>

        <div class="card-footer">
          <small class="text-muted">Last updated 3 mins ago</small>
        </div>
      </div>

      <div class="card">
        <img src="" id="ic3" width="40%" />
        <div class="card-body">
          <h4 class="card-title" id="t3">TODAYS TEMP</h4>
          <h4 id="today3"></h4>
        </div>

        <div class="card-footer">
          <small class="text-muted">Last updated 3 mins ago</small>
        </div>
      </div>

      <div class="card">
        <img src="" id="ic4" width="40%" />
        <div class="card-body">
          <h4 class="card-title" id="t4">TODAYS TEMP</h4>
          <h4 id="today4"></h4>
        </div>

      
      
    </div>

    <h1 id="demo"></h1>

    <script>

var s = "https://api.openweathermap.org/data/2.5/forecast?q=Pune&appid=043568f38a610c9e3c6c32258ab2faac";

        fetch(s)
          .then((res) => res.json())
          .then((data) => {
            for (var i = 0; i <= 4; i++) {
              document.getElementById("today"+i).innerHTML = parseInt(
                data.list[5*i].main.temp - 273
              );
              document.getElementById("ic"+i).src =
                "http://openweathermap.org/img/wn/" +
                data.list[5*i].weather[0].icon +
                "@2x.png";
                document.getElementById("t"+i).innerHTML=(data.list[5*i].dt_txt.split(" ")[0]);
            }});




      var city;
      function my() {
        city = document.getElementById("myText").value;
        console.log(city);
        var s =
          "https://api.openweathermap.org/data/2.5/forecast?q=" +
          city +
          "&appid=043568f38a610c9e3c6c32258ab2faac";

        fetch(s)
          .then((res) => res.json())
          .then((data) => {
            for (var i = 0; i <= 4; i++) {
              document.getElementById("today"+i).innerHTML = parseInt(
                data.list[5*i+1].main.temp - 273
              )+"&degC";
              document.getElementById("ic"+i).src =
                "http://openweathermap.org/img/wn/" +
                data.list[5*i+1].weather[0].icon +
                "@2x.png";
                document.getElementById("t"+i).innerHTML=(data.list[5*i+2].dt_txt.split(" ")[0]);
            }
          });
      }


      
    </script>
  </body>
</html>
