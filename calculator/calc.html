<html>
    <head>
        <link rel="stylesheet" href="calc.css">
    </head>
    <body style="background-image: url('https://th.bing.com/th/id/R.2a6ebd3734fc07bad109eceb5611005d?rik=dmPd7ImSYAZcIg&riu=http%3a%2f%2fwallup.net%2fwp-content%2fuploads%2f2016%2f07%2f19%2f21423-simple_background.jpg&ehk=TikWV6AXpHYlNl%2bzSWxD6rXdNwZ3WaOubhM4gK6DvHo%3d&risl=&pid=ImgRaw&r=0')">
        
        <div class="calc">
            <div class="he">
                <h1 class="he1" id="h">HELLO I AM CALCULATOR</h1>
            </div>
            <div class="history">
                <h1 class="h" id="his"></h1>
            </div>

            <div class="result">
             <h1 class="hh" id="result"></h1>
            </div>

            <div class="in">
                <button class="operator" id="44" onclick="y(this)">C</button>
                <button class="operator" id="43" onclick="y(this)">CE</button>
                <button class="numbers" id="0"  onclick="y(this)">0</button>
                <button class="operator" id="/"  onclick="y(this)">/</button>
                <br>
                
                <button class="numbers"  id="1"  onclick="y(this)">1</button>
                <button class="numbers"  id="2"  onclick="y(this)">2</button>
                <button class="numbers"  id="3"  onclick="y(this)">3</button>
                <button class="operator"  id="+"  onclick="y(this)">+</button>
                <br>
                
                <button class="numbers"  id="4"  onclick="y(this)">4</button>
                <button class="numbers"  id="5"  onclick="y(this)">5</button>
                <button class="numbers"  id="6"  onclick="y(this)">6</button>
                <button class="operator"  id="*"  onclick="y(this)" >*</button>

                <br>

                <button class="numbers"  id="7"  onclick="y(this)">7</button>
                <button class="numbers"  id="8"  onclick="y(this)">8</button>
                <button class="numbers"  id="9"  onclick="y(this)">9</button>
                <button class="operator"  id="45" onclick="y(this)">=</button>

            </div>
        </div>



        <script type="text/javascript" src="calc.js"></script>
